---
# ── User Configuration ──────────────────────────────────────
# macOS username on the remote Mac
target_user: jb

# Remote Mac's Tailscale hostname (used in SSH config and aliases)
# Find with: tailscale status
tailscale_hostname: jbs-mac-mini.tail0f84e9.ts.net

# ── tmux Settings ───────────────────────────────────────────
tmux_session_name: claude
tmux_history_limit: 100000

# ── mosh Settings ───────────────────────────────────────────
# UDP port range for mosh connections
mosh_ports: "60000:60010"

# ── Homebrew Path (Apple Silicon) ───────────────────────────
homebrew_prefix: /opt/homebrew

# ── RustDesk Settings ──────────────────────────────────────
# Remote desktop for headless GUI access
rustdesk_app_path: /Applications/RustDesk.app
rustdesk_binary: /Applications/RustDesk.app/Contents/MacOS/RustDesk
rustdesk_service_bin: /Applications/RustDesk.app/Contents/MacOS/service
rustdesk_config_dir: "/Users/{{ target_user }}/Library/Preferences/com.carriez.RustDesk"
# RustDesk ID (for reference; connections use tailscale_hostname directly)
rustdesk_remote_id: ""
# Permanent password for unattended access (use ansible-vault in production)
rustdesk_password: "CHANGE_ME"
